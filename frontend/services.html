<!DOCTYPE html>
<html>
<head>
  <title>Services</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h2>Select Service</h2>

  <div class="grid">

    <div class="box" onclick="go('hospital')">🏥 Hospital</div>
    <div class="box" onclick="go('bank')">🏦 Bank</div>
    <div class="box" onclick="go('canteen')">🍽️ Canteen</div>
    <div class="box" onclick="go('salon')">💇 Salon</div>

  </div>

  <button onclick="logout()">Logout</button>

</div>

<script>
if(!localStorage.getItem("user")){
  location="auth.html";
}

function go(s){
 localStorage.setItem("service",s);
 location=s+".html";
}

function logout(){
 localStorage.clear();
 location="index.html";
}
</script>

</body>
</html>
